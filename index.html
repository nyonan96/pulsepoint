<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal | Pulse</title>
    <style>
        :root { --bg: #000000; --card: #1A1A1A; --text: #FFFFFF; --muted: #888888; --accent: #4CC9F0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 40px 30px; border-radius: 28px; border: 1px solid #333; text-align: center; }
        .logo-circle { width: 60px; height: 60px; background: rgba(76, 201, 240, 0.1); border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 1px solid var(--accent); }
        .pulse-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--text); }
        p { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
        .link-card { display: block; background: #252525; margin-bottom: 12px; padding: 18px; border-radius: 16px; text-decoration: none; color: var(--accent); font-weight: 700; font-size: 16px; transition: transform 0.2s ease; border: 1px solid transparent; }
        .link-card:active { transform: scale(0.98); background: #2A2A2A; }
        .link-card:hover { border-color: var(--accent); }
        .footer-text { font-size: 12px; color: #555; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-circle">
            <div class="pulse-icon"></div>
        </div>
        <h1>Pulse Legal</h1>
        <p>Please select a document to review our policies and terms.</p>

        <a href="privacy.html" class="link-card">Privacy Policy</a>
        <a href="terms.html" class="link-card">Terms of Use</a>

        <div class="footer-text">Pulse v1.0.0</div>
    </div>
</body>
</html>
